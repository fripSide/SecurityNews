name: weekly_release

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

jobs:
  release_pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install system dependencies for weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev libcairo2 fonts-noto-cjk

      - name: Generate PDF and HTML
        id: gen_pdf
        run: uv run python -m secnews.generate_pdf

      - name: Get current date
        id: date
        run: echo "DATE=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add secnews/data/report/
          git diff --cached --quiet || git commit -m "generate weekly report ${{ steps.date.outputs.DATE }}"
          git pull --rebase
          git push

      - name: Create Release
        if: hashFiles('secnews/data/report/*.pdf') != '' || hashFiles('secnews/data/report/*.html') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "release-${{ steps.date.outputs.DATE }}"
          name: "${{ steps.gen_pdf.outputs.REPORT_TITLE }}"
          generate_release_notes: false
          body: "自动生成的${{ steps.gen_pdf.outputs.REPORT_TITLE }} PDF 与 HTML。"
          files: |
            secnews/data/report/*.pdf
            secnews/data/report/*.html
